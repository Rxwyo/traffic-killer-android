name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Install Gradle
      run: |
        wget https://services.gradle.org/distributions/gradle-8.5-bin.zip
        unzip -d /opt/gradle gradle-8.5-bin.zip
        echo "export PATH=/opt/gradle/gradle-8.5/bin:\$PATH" >> $GITHUB_ENV
        echo "/opt/gradle/gradle-8.5/bin" >> $GITHUB_PATH
    
    - name: Build debug APK
      run: gradle assembleDebug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: traffic-killer-android
        path: app/build/outputs/apk/debug/*.apk
    
    - name: Create Release
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        files: app/build/outputs/apk/debug/*.apk
        tag_name: v1.0.${{ github.run_number }}
        name: 流量杀手 Android v1.0.${{ github.run_number }}
        body: |
          ## 流量杀手 Android 版
          
          ### 安装方法
          1. 下载 APK 文件
          2. 在手机上允许"安装未知来源应用"
          3. 点击 APK 安装
          
          ### 功能
          - 多线程下载测试
          - 后台运行
          - 悬浮窗显示
          - 流量统计
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
